# nginx vhost for cli.kyc.rip — installer alias for swap.kyc.rip.
#
# - cli.kyc.rip/install.sh   → serve scripts/install.sh directly so the
#                              curl one-liner is short and on-brand.
# - cli.kyc.rip/             → 301 to https://swap.kyc.rip/ (one canonical
#                              landing page; cli is just the dev-friendly
#                              alias).
#
# Cert issued via:
#   certbot certonly --webroot -w /root/store/nginx/webroot -d cli.kyc.rip
#     --non-interactive --agree-tos -m admin@kyc.rip --keep-until-expiring
# Same renewal deploy hook reloads nginx (already in place from swap).

server {
    listen 80;
    server_name cli.kyc.rip;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name cli.kyc.rip;

    ssl_certificate     /etc/letsencrypt/live/cli.kyc.rip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cli.kyc.rip/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:1m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # Installer one-liner: curl -fsSL cli.kyc.rip/install.sh | sh
    location = /install.sh {
        default_type text/plain;
        alias /etc/nginx/conf.d/install.sh;
        add_header Cache-Control "public, max-age=300";
    }

    # Everything else → canonical landing on swap.kyc.rip
    location / {
        return 301 https://swap.kyc.rip$request_uri;
    }
}
