# nginx vhost for swap.kyc.rip
#
# Page content is inlined via `return 200` so we don't need a new
# volume mount on the (containerised) openresty — the existing conf-dir
# mount picks this file up automatically.
#
# Cert renewal is fully automated:
# /etc/letsencrypt/renewal-hooks/deploy/reload-nginx.sh runs
# `docker exec nginx nginx -s reload` after each `certbot renew`.

map $sent_http_content_type $charset_swap {
    "text/html" "utf-8";
    default     "";
}

# Single source of truth for the landing HTML, served on both ports.
# (HTTP also keeps the ACME webroot for renewals.)
server {
    listen 80;
    server_name swap.kyc.rip;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        try_files $uri =404;
    }

    # Force everything else over to HTTPS so we have one canonical surface.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name swap.kyc.rip;

    ssl_certificate     /etc/letsencrypt/live/swap.kyc.rip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swap.kyc.rip/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:1m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location = / {
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300";
        return 200 '<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>swap.kyc.rip — terminal-only swap</title><meta name="description" content="A privacy-first crypto swap aggregator, accessible only over SSH."><meta property="og:title" content="ssh swap.kyc.rip — terminal-only crypto swap"><meta property="og:description" content="Open your shell. No browser. No JS. No fingerprint."><meta name="theme-color" content="#0a0a0a"><style>:root{--bg:#0a0a0a;--fg:#cccccc;--accent:#00d7af;--warn:#ffaf00;--muted:#7a7a7a}*,*::before,*::after{box-sizing:border-box}html,body{margin:0;padding:0}body{background:var(--bg);color:var(--fg);font-family:ui-monospace,SFMono-Regular,"JetBrains Mono","Fira Code",Menlo,Consolas,monospace;line-height:1.55;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem}main{max-width:760px;width:100%}h1{font-size:1.05rem;font-weight:500;color:var(--muted);margin:0 0 .5rem}.section-h{color:var(--warn);font-size:.8rem;margin:1.6rem 0 .5rem;letter-spacing:.04em;text-transform:uppercase}.cmd{background:#111;color:var(--accent);padding:1rem 1.25rem;border-radius:8px;font-size:clamp(1rem,4vw,1.5rem);font-weight:600;user-select:all;border:1px solid #1f1f1f}.cmd.small{font-size:clamp(.85rem,2.6vw,1rem);padding:.7rem 1rem}.cmd .prompt{color:var(--muted);user-select:none}.copy-hint{color:var(--muted);font-size:.8rem;margin-top:.4rem}.blurb{color:var(--fg);margin:1.2rem 0}.blurb p{margin:0 0 .8rem}.meta{color:var(--muted);font-size:.85rem;margin-top:2rem;padding-top:1rem;border-top:1px dashed #1f1f1f}.meta .label{color:var(--warn)}.grid{display:grid;gap:.4rem;grid-template-columns:max-content 1fr}.grid .k{color:var(--muted)}.grid .v{word-break:break-all}a{color:var(--accent);text-decoration:none;border-bottom:1px dotted #00d7af}a:hover{color:#fff}</style></head><body><main><h1>kyc.rip · terminal-only swap</h1><div class="cmd"><span class="prompt">&#10095;</span>ssh swap.kyc.rip</div><div class="copy-hint">click the line to copy · paste into your terminal</div><div class="blurb"><p>An interactive crypto swap served over SSH. No JavaScript, no cookies, no browser fingerprint.</p><p>Backed by the <a href="https://kyc.rip">kyc.rip</a> aggregator. Type assets, amount, destination. Get a quote. Confirm. Done.</p></div><div class="section-h">Or run it locally</div><div class="cmd small"><span class="prompt">&#10095;</span>brew install kyc-rip/tap/kyc-cli</div><div class="copy-hint">macOS / linux via Homebrew</div><div class="cmd small" style="margin-top:.5rem"><span class="prompt">&#10095;</span>curl -fsSL https://swap.kyc.rip/install.sh | sh</div><div class="copy-hint">linux / macOS one-liner — verifies sha256, drops binary in PATH</div><div class="cmd small" style="margin-top:.5rem"><span class="prompt">&#10095;</span>scoop bucket add kyc-rip https://github.com/kyc-rip/scoop-bucket &amp;&amp; scoop install kyc-cli</div><div class="copy-hint">Windows (Scoop bucket coming soon — for now grab a tarball from <a href="https://github.com/kyc-rip/cli/releases">github releases</a>)</div><div class="section-h">Encrypted channels</div><div class="meta"><div class="grid"><span class="k">tor</span><span class="v">ozz6kgrbp6epsxhrid456udvwj3vzecb4f7jz5orxcrpxn4f2bejuyid.onion</span><span class="k">i2p</span><span class="v">r4ziaqaec7w73x7ltpz5pi5kswclgjdw6ioyz25mbtrisprneqhq.b32.i2p</span></div></div><div class="meta"><div class="grid"><span class="k label">host key</span><span class="v">SHA256:wavvotTfJrgK/kY3qG3rdA3OY7Qs9sRXYXCi2tO8KYY</span><span class="k">website</span><span class="v"><a href="https://kyc.rip">kyc.rip</a></span><span class="k">source</span><span class="v"><a href="https://github.com/kyc-rip/cli">github.com/kyc-rip/cli</a></span></div><p style="margin-top:1.2rem;">Verify the host key fingerprint the first time you connect. Anything else is not us.</p></div></main></body></html>';
    }

    # Serve the install.sh from the repo so the curl|sh one-liner is short.
    # The file is included in /root/store/nginx/conf/install.sh on the host.
    location = /install.sh {
        default_type text/plain;
        alias /etc/nginx/conf.d/install.sh;
    }

    location / {
        return 404;
    }
}
