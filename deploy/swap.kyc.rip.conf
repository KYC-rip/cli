# nginx vhost for swap.kyc.rip
#
# The page content is inlined via `return 200` so we don't need a new
# volume mount on the (containerised) openresty — the existing conf-dir
# mount picks this file up automatically.
#
# HTTPS uses the existing default cert (name-mismatch warning); the page
# itself tells visitors to use SSH instead, so cert UX is irrelevant.
# Recommend issuing a Let's Encrypt cert once DNS is in place:
#   certbot certonly --webroot -w /usr/share/nginx/html -d swap.kyc.rip

map $sent_http_content_type $charset_swap {
    "text/html" "utf-8";
    default     "";
}

server {
    listen 80;
    server_name swap.kyc.rip;

    # Webroot for certbot HTTP-01 challenges. Mounted from host
    # /root/store/nginx/webroot via docker-compose.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/acme;
        try_files $uri =404;
    }

    location = / {
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300";
        return 200 '<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>swap.kyc.rip — terminal-only swap</title><meta name="description" content="A privacy-first crypto swap aggregator, accessible only over SSH."><meta property="og:title" content="ssh swap.kyc.rip — terminal-only crypto swap"><meta property="og:description" content="Open your shell. No browser. No JS. No fingerprint."><meta name="theme-color" content="#0a0a0a"><style>:root{--bg:#0a0a0a;--fg:#cccccc;--accent:#00d7af;--warn:#ffaf00;--muted:#7a7a7a}*,*::before,*::after{box-sizing:border-box}html,body{margin:0;padding:0}body{background:var(--bg);color:var(--fg);font-family:ui-monospace,SFMono-Regular,"JetBrains Mono","Fira Code",Menlo,Consolas,monospace;line-height:1.55;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem}main{max-width:720px;width:100%}h1{font-size:1.05rem;font-weight:500;color:var(--muted);margin:0 0 .5rem}.cmd{background:#111;color:var(--accent);padding:1rem 1.25rem;border-radius:8px;font-size:clamp(1rem,4vw,1.5rem);font-weight:600;user-select:all;border:1px solid #1f1f1f}.cmd .prompt{color:var(--muted);user-select:none}.copy-hint{color:var(--muted);font-size:.8rem;margin-top:.4rem}.blurb{color:var(--fg);margin:1.5rem 0}.blurb p{margin:0 0 .8rem}.meta{color:var(--muted);font-size:.85rem;margin-top:2rem;padding-top:1rem;border-top:1px dashed #1f1f1f}.meta .label{color:var(--warn)}.grid{display:grid;gap:.4rem;grid-template-columns:max-content 1fr}.grid .k{color:var(--muted)}.grid .v{word-break:break-all}a{color:var(--accent);text-decoration:none;border-bottom:1px dotted #00d7af}a:hover{color:#fff}</style></head><body><main><h1>kyc.rip · terminal-only swap</h1><div class="cmd"><span class="prompt">&#10095;</span>ssh swap.kyc.rip</div><div class="copy-hint">click the line to copy · paste into your terminal</div><div class="blurb"><p>An interactive crypto swap served over SSH. No JavaScript, no cookies, no browser fingerprint.</p><p>Backed by the <a href="https://kyc.rip">kyc.rip</a> aggregator. Type assets, amount, destination. Get a quote. Confirm. Done.</p></div><div class="cmd"><span class="prompt">&#10095;</span>brew install kyc-rip/tap/kyc-cli</div><div class="copy-hint">prefer running locally? a downloadable cli is on <a href="https://github.com/kyc-rip/sshwap/releases">github releases</a> for linux / macos / windows</div><div class="meta"><div class="grid"><span class="k label">host key</span><span class="v">SHA256:wavvotTfJrgK/kY3qG3rdA3OY7Qs9sRXYXCi2tO8KYY</span><span class="k">tor (.onion)</span><span class="v">ozz6kgrbp6epsxhrid456udvwj3vzecb4f7jz5orxcrpxn4f2bejuyid.onion</span><span class="k">i2p (.b32.i2p)</span><span class="v">r4ziaqaec7w73x7ltpz5pi5kswclgjdw6ioyz25mbtrisprneqhq.b32.i2p</span><span class="k">website</span><span class="v"><a href="https://kyc.rip">kyc.rip</a></span><span class="k">source</span><span class="v"><a href="https://github.com/kyc-rip/sshwap">github.com/kyc-rip/sshwap</a></span></div><p style="margin-top:1.2rem;">Verify the host key fingerprint above the first time you connect. Anything else is not us.</p></div></main></body></html>';
    }

    # Anything else → 404 (don't leak the default_server fallthrough)
    location / {
        return 404;
    }
}

server {
    listen 443 ssl;
    server_name swap.kyc.rip;

    # Let's Encrypt certificate, issued via certbot --webroot.
    # /etc/letsencrypt is mounted into the openresty container from
    # the host's /etc/letsencrypt (read-only).
    ssl_certificate     /etc/letsencrypt/live/swap.kyc.rip/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swap.kyc.rip/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:1m;
    add_header Strict-Transport-Security "max-age=31536000" always;

    location = / {
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=300";
        return 200 '<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>swap.kyc.rip — terminal-only swap</title><meta name="theme-color" content="#0a0a0a"><style>:root{--bg:#0a0a0a;--fg:#cccccc;--accent:#00d7af;--warn:#ffaf00;--muted:#7a7a7a}*,*::before,*::after{box-sizing:border-box}html,body{margin:0;padding:0}body{background:var(--bg);color:var(--fg);font-family:ui-monospace,SFMono-Regular,"JetBrains Mono","Fira Code",Menlo,Consolas,monospace;line-height:1.55;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1.25rem}main{max-width:720px;width:100%}h1{font-size:1.05rem;font-weight:500;color:var(--muted);margin:0 0 .5rem}.cmd{background:#111;color:var(--accent);padding:1rem 1.25rem;border-radius:8px;font-size:clamp(1rem,4vw,1.5rem);font-weight:600;user-select:all;border:1px solid #1f1f1f}.cmd .prompt{color:var(--muted);user-select:none}.copy-hint{color:var(--muted);font-size:.8rem;margin-top:.4rem}.blurb{color:var(--fg);margin:1.5rem 0}.blurb p{margin:0 0 .8rem}.meta{color:var(--muted);font-size:.85rem;margin-top:2rem;padding-top:1rem;border-top:1px dashed #1f1f1f}.meta .label{color:var(--warn)}.grid{display:grid;gap:.4rem;grid-template-columns:max-content 1fr}.grid .k{color:var(--muted)}.grid .v{word-break:break-all}a{color:var(--accent);text-decoration:none;border-bottom:1px dotted #00d7af}a:hover{color:#fff}</style></head><body><main><h1>kyc.rip · terminal-only swap</h1><div class="cmd"><span class="prompt">&#10095;</span>ssh swap.kyc.rip</div><div class="copy-hint">click the line to copy · paste into your terminal</div><div class="blurb"><p>An interactive crypto swap served over SSH. No browser, no JS, no fingerprint.</p></div><div class="meta"><div class="grid"><span class="k label">host key</span><span class="v">SHA256:wavvotTfJrgK/kY3qG3rdA3OY7Qs9sRXYXCi2tO8KYY</span><span class="k">tor (.onion)</span><span class="v">ozz6kgrbp6epsxhrid456udvwj3vzecb4f7jz5orxcrpxn4f2bejuyid.onion</span><span class="k">i2p (.b32.i2p)</span><span class="v">r4ziaqaec7w73x7ltpz5pi5kswclgjdw6ioyz25mbtrisprneqhq.b32.i2p</span><span class="k">website</span><span class="v"><a href="https://kyc.rip">kyc.rip</a></span><span class="k">source</span><span class="v"><a href="https://github.com/kyc-rip/sshwap">github.com/kyc-rip/sshwap</a></span></div></div></main></body></html>';
    }

    location / {
        return 404;
    }
}
