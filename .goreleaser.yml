# goreleaser config — cross-compiles cmd/kyc-cli + cmd/sshwap and
# attaches binaries to a GitHub release on tag push.
#
# Local dry-run:   goreleaser release --snapshot --clean
# Tag a release:   git tag v0.1.0 && git push --tags
#
# (sshwap publishes to GitHub but the SSH server is server-side; the
#  release exists mainly so users can pin a version when self-hosting
#  their own instance.)
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kyc-cli
    main: ./cmd/kyc-cli
    binary: kyc-cli
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: sshwap
    main: ./cmd/sshwap
    binary: sshwap
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  # One archive per binary/id so windows (no sshwap) and unix (both) line up.
  - id: kyc-cli
    ids: [kyc-cli]
    formats: [tar.gz]
    name_template: "kyc-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - CHANGELOG*

  - id: sshwap
    ids: [sshwap]
    formats: [tar.gz]
    name_template: "sshwap_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE*
      - CHANGELOG*
      - deploy/sshwap.service
      - deploy/install.sh

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request

release:
  draft: false
  prerelease: auto
  github:
    owner: kyc-rip
    name: cli

scoops:
  - name: kyc-cli
    repository:
      owner: kyc-rip
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://swap.kyc.rip
    description: "Terminal-only crypto swap (the kyc.rip aggregator as a TUI)"
    license: MIT
    skip_upload: auto
    ids: [kyc-cli]

brews:
  - name: kyc-cli
    # Skip pushing the formula automatically unless a cross-repo PAT
    # is wired in (HOMEBREW_TAP_TOKEN secret + release.yml exports it).
    # Releases without the PAT still publish the binary archives; the
    # tap formula is updated by hand from /tmp/tap-work/. Once the
    # token is configured, `skip_upload: auto` flips to a real push.
    skip_upload: false
    repository:
      owner: kyc-rip
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://swap.kyc.rip
    description: "Terminal-only crypto swap (the kyc.rip aggregator as a TUI)"
    license: MIT
    install: |
      bin.install "kyc-cli"
    test: |
      system "#{bin}/kyc-cli", "--version"
    ids:
      - kyc-cli
