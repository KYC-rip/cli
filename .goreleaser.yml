# goreleaser config — cross-compiles cmd/kyc-cli + cmd/sshwap and
# attaches binaries to a GitHub release on tag push.
#
# Local dry-run:   goreleaser release --snapshot --clean
# Tag a release:   git tag v0.1.0 && git push --tags
#
# (sshwap publishes to GitHub but the SSH server is server-side; the
#  release exists mainly so users can pin a version when self-hosting
#  their own instance.)
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: kyc-cli
    main: ./cmd/kyc-cli
    binary: kyc-cli
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: sshwap
    main: ./cmd/sshwap
    binary: sshwap
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}
    goos: [linux, darwin]
    goarch: [amd64, arm64]

archives:
  - id: default
    formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE*
      - README*
      - deploy/*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request

release:
  draft: false
  prerelease: auto
  github:
    owner: xbtoshi
    name: sshwap
